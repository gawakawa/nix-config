name: "CI"

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      nix-config: ${{ steps.filter.outputs.nix-config }}
      nvim: ${{ steps.filter.outputs.nvim }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            nix-config:
              - '**'
              - '!nvim/**'
            nvim:
              - 'nvim/**'

  build-nix-config:
    needs: detect-changes
    if: needs.detect-changes.outputs.nix-config == 'true'
    strategy:
      matrix:
        include:
          - platform: nixos
            runs-on: ubuntu-latest
            build-target: nixosConfigurations.nixos.config.system.build.toplevel
          - platform: darwin
            runs-on: macos-latest
            build-target: darwinConfigurations.mac.system
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: gawakawa
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check
        run: nix flake check --accept-flake-config

      - name: Build ${{ matrix.platform }} configuration
        run: nix build .#${{ matrix.build-target }} --accept-flake-config --show-trace

  build-nvim:
    needs: detect-changes
    if: needs.detect-changes.outputs.nvim == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: gawakawa
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check
        run: nix flake check ./nvim --accept-flake-config

      - name: Build Neovim package
        run: nix build ./nvim

  ci-success:
    needs: [detect-changes, build-nix-config, build-nvim]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify build-nix-config
        if: needs.detect-changes.outputs.nix-config == 'true'
        run: test "${{ needs.build-nix-config.result }}" == "success"

      - name: Verify build-nvim
        if: needs.detect-changes.outputs.nvim == 'true'
        run: test "${{ needs.build-nvim.result }}" == "success"
